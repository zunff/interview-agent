# 示例配置文件
# 复制此文件为 application-dev.yml 并填入您的实际配置

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_agent
    username: interview
    password: interview123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Spring AI 模型配置（按环境切换）
  ai:
    dashscope:
      # 请替换为您的 DashScope API Key
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      vision:
        model: qwen3.5-omni-plus
        # base-url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 可选，默认已内置
      # ASR 实时语音识别配置（DashScope SDK + qwen3-asr-flash-realtime）
      asr:
        model: qwen3-asr-flash-realtime
        url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
        language: zh
        input-audio-format: pcm
        sample-rate: 16000
      embedding:
        model: text-embedding-v3
      # TTS 语音合成配置（Realtime 模式）
      tts:
        model: qwen3-tts-flash-realtime
        voice: Ethan
        # url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime  # 可选，默认已内置
    # 向量存储配置 (pgvector)
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true

# LangGraph4j 图配置
langgraph4j:
  graph:
    main-recursion-limit: 25
    sub-recursion-limit: 15

# 日志级别
logging:
  level:
    root: INFO
    org.bsc.langgraph4j: DEBUG
    org.springframework.ai: DEBUG
    com.zunff.interview: DEBUG
