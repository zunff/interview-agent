spring:
  application:
    name: langgraph4j-agent-project
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4-turbo-preview
          temperature: 0.7

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.bsc.langgraph4j: DEBUG
    org.springframework.ai: DEBUG

langgraph4j:
  studio:
    enabled: true
    path: /studio
