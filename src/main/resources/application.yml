spring:
  application:
    name: interview-agent
  profiles:
    active: dev

  # Spring AI 通用配置（不含模型，模型在 profile 中指定）
  ai:
    model:
      audio:
        transcription: dashscope
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2s
        multiplier: 2
        max-interval: 30s
      on-http-codes: 429, 500, 502, 503

  # 静态资源处理
  web:
    resources:
      add-mappings: true
  mvc:
    throw-exception-if-no-handler-found: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zunff.agent.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 面试系统配置
interview:
  video:
    analysis-interval: 5000      # 视频分析间隔(ms)
    frame-rate: 1                # 每秒采样帧数
    max-frames-per-analysis: 10  # 每次分析最大帧数
  audio:
    sample-rate: 16000           # 音频采样率
    chunk-duration: 1000         # 音频块时长(ms)
  session:
    max-technical-questions: 6   # 技术轮最大问题数
    max-business-questions: 4    # 业务轮最大问题数
    round-pass-score: 75         # 轮次通过分数阈值
    high-score-threshold: 85     # 高分阈值
    consecutive-high-for-early-end: 3  # 连续高分次数触发提前结束
    max-follow-ups-technical: 3  # 技术轮每题最大追问数
    max-follow-ups-business: 2   # 业务轮每题最大追问数
    answer-timeout: 120000       # 回答超时(ms)
  multimodal:
    enabled: true                # 是否启用多模态分析
  knowledge:
    enabled: true                # 是否启用知识库检索
    top-k: 5                     # 默认检索数量
