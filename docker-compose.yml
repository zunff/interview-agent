version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interview-agent-db
    environment:
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: interview123
      POSTGRES_DB: interview_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interview_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local